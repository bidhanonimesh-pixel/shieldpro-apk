name: Build ShieldPro APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract zip
        run: |
          ZIP=$(find . -name "*.zip" | head -1)
          echo "Found: $ZIP"
          unzip -o "$ZIP" -d _ex/
          SRC=$(find _ex -name "settings.gradle.kts" | head -1 | xargs dirname)
          echo "Source: $SRC"
          cp -r "$SRC"/. ./

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Generate gradlew
        run: |
          gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew

      - name: Create required files
        run: |
          echo "GEMINI_API_KEY=PLACEHOLDER_KEY" > .env
          keytool -genkey -v -keystore debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Install Android SDK
        run: |
          ANDROID_HOME=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Build APK
        run: |
          export GRADLE_OPTS="-Xmx2g -Dfile.encoding=UTF-8"
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShieldPro-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
