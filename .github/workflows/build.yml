name: Build ShieldPro APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract zip
        run: |
          cp gradle.properties /tmp/gradle.properties.bak
          ZIP=$(find . -name "*.zip" | head -1)
          echo "Found ZIP: $ZIP"
          unzip -o "$ZIP" -d _ex/
          SRC=$(find _ex -name "settings.gradle.kts" | head -1 | xargs dirname)
          cp -r "$SRC"/. ./
          cp /tmp/gradle.properties.bak gradle.properties
          echo "Done ✓"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 'current'

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShieldPro-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
