name: Build ShieldPro APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract zip
        run: |
          ZIP=$(find . -name "*.zip" | head -1)
          echo "Found: $ZIP"
          unzip -o "$ZIP" -d _ex/
          SRC=$(find _ex -name "settings.gradle.kts" | head -1 | xargs dirname)
          echo "Source: $SRC"
          cp -r "$SRC"/. ./

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: |
          export GRADLE_OPTS="-Xmx2g -Dfile.encoding=UTF-8"
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShieldPro-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
