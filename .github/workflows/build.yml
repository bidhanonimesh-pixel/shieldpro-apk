name: Diagnose Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Show repo contents
        run: |
          echo "=== ROOT FILES ==="
          ls -la
          echo "=== ZIP CONTENTS ==="
          ZIP=$(find . -name "*.zip" | head -1)
          echo "ZIP: $ZIP"
          unzip -l "$ZIP"

      - name: Extract zip
        run: |
          ZIP=$(find . -name "*.zip" | head -1)
          unzip -o "$ZIP" -d _ex/
          SRC=$(find _ex -name "settings.gradle.kts" | head -1 | xargs dirname)
          echo "=== EXTRACTED ROOT ==="
          ls -la "$SRC"
          echo "=== app/build.gradle.kts ==="
          cat "$SRC/app/build.gradle.kts"
          echo "=== build.gradle.kts ==="
          cat "$SRC/build.gradle.kts"
          echo "=== gradle-wrapper.properties ==="
          cat "$SRC/gradle/wrapper/gradle-wrapper.properties"
          echo "=== gradlew exists? ==="
          ls -la "$SRC/gradlew"

      - name: Download wrapper jar
        run: |
          ZIP=$(find . -name "*.zip" | head -1)
          unzip -o "$ZIP" -d _ex/
          SRC=$(find _ex -name "settings.gradle.kts" | head -1 | xargs dirname)
          cp -r "$SRC"/. ./
          mkdir -p gradle/wrapper
          curl -fsSL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Try build and show full error
        run: |
          export GRADLE_OPTS="-Xmx2g"
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | head -100
        continue-on-error: true
