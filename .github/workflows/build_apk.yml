name: Build ShieldPro APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: |
          unzip shieldpro_v5.zip
          ls shieldpro_v5/

      - name: Setup Gradle 9.3.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Create env and keystore
        working-directory: shieldpro_v5
        run: |
          echo "STORE_PASSWORD=android" > .env
          echo "KEY_PASSWORD=android" >> .env
          cp .env .env.example
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK
        working-directory: shieldpro_v5
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          STORE_PASSWORD: android
          KEY_PASSWORD: android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShieldPro-APK
          path: shieldpro_v5/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
