name: Diagnose ShieldPro

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip and show structure
        run: |
          unzip shieldpro_v5.zip
          echo "====== ROOT FILES ======"
          ls -la shieldpro_v5/
          echo ""
          echo "====== gradlew exists? ======"
          ls -la shieldpro_v5/gradlew 2>/dev/null && echo "YES" || echo "NO - gradlew missing!"
          echo ""
          echo "====== build.gradle.kts ======"
          cat shieldpro_v5/app/build.gradle.kts
          echo ""
          echo "====== settings.gradle.kts ======"
          cat shieldpro_v5/settings.gradle.kts
          echo ""
          echo "====== libs.versions.toml ======"
          cat shieldpro_v5/gradle/libs.versions.toml
          echo ""
          echo "====== AndroidManifest ======"
          cat shieldpro_v5/app/src/main/AndroidManifest.xml

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Try build and show errors
        working-directory: shieldpro_v5
        continue-on-error: true
        run: |
          gradle assembleDebug --no-daemon 2>&1
        env:
          STORE_PASSWORD: android
          KEY_PASSWORD: android
