name: Build ShieldPro APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: |
          unzip shieldpro_v5.zip
          ls shieldpro_v5/

      - name: Fix build.gradle.kts syntax
        working-directory: shieldpro_v5
        run: |
          # AGP 9.x special syntax → standard syntax
          sed -i 's/compileSdk { version = release(36) { minorApiLevel = 1 } }/compileSdk = 36/' app/build.gradle.kts
          sed -i 's/targetSdk { version = release(36) { minorApiLevel = 1 } }/targetSdk = 36/' app/build.gradle.kts
          sed -i 's/compileSdk { version = release([0-9]*) { minorApiLevel = [0-9]* } }/compileSdk = 36/' app/build.gradle.kts
          sed -i 's/targetSdk { version = release([0-9]*) { minorApiLevel = [0-9]* } }/targetSdk = 36/' app/build.gradle.kts
          echo "=== build.gradle.kts after fix ==="
          cat app/build.gradle.kts

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Create env and keystore
        working-directory: shieldpro_v5
        run: |
          echo "STORE_PASSWORD=android" > .env
          echo "KEY_PASSWORD=android" >> .env
          echo "KEYSTORE_PATH=debug.keystore" >> .env
          cp .env .env.example
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK
        working-directory: shieldpro_v5
        run: |
          gradle assembleDebug --no-daemon --stacktrace
        env:
          STORE_PASSWORD: android
          KEY_PASSWORD: android
          KEYSTORE_PATH: debug.keystore

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShieldPro-Debug-APK
          path: shieldpro_v5/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
