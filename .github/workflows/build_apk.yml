name: Build ShieldPro APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: unzip shieldpro_v5.zip

      - name: Fix gradlew permission
        working-directory: shieldpro_v5
        run: chmod +x gradlew

      - name: Create env files
        working-directory: shieldpro_v5
        run: |
          touch .env
          echo "STORE_PASSWORD=android" >> .env
          echo "KEY_PASSWORD=android" >> .env
          echo "KEYSTORE_PATH=debug.keystore" >> .env
          cp .env .env.example 2>/dev/null || true

      - name: Create debug keystore
        working-directory: shieldpro_v5
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK
        working-directory: shieldpro_v5
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --info
        env:
          STORE_PASSWORD: android
          KEY_PASSWORD: android
          KEYSTORE_PATH: debug.keystore

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShieldPro-Debug-APK
          path: shieldpro_v5/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
